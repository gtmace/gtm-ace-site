<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | GTM Ace</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #0B1929;
  --gray-100: #EEF1F6;
  --gray-200: #D8DDE8;
  --text: #0B1929;
  --text-muted: #4A5568;
  --white: #FFFFFF;
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  font-family: 'Figtree', sans-serif;
  margin: 0;
  background: var(--white);
  color: var(--text);
}

/* NAV */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.1rem 3rem;
  background: rgba(255,255,255,0.95);
  border-bottom: 1px solid var(--gray-200);
}

.nav-logo {
  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
  text-decoration: none;
  transition: opacity 0.2s ease;
}

.nav-logo:hover {
  opacity: 0.8;
}

.nav-links {
  display: flex;
  gap: 2rem;
  align-items: center;
}

.nav-links a {
  font-size: 15px;
  color: var(--text-muted);
  text-decoration: none;
}

.nav-cta {
  background: #1E3A5F;
  color: #fff !important;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  text-decoration: none;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: 80px auto;
  padding: 0 20px;
}

h1 {
  font-size: 40px;
  margin-bottom: 40px;
}

/* FEATURED POST */
.featured-post {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 30px;
  margin-bottom: 50px;
  align-items: center;
}

.featured-post img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  aspect-ratio: 16 / 9;
  border-radius: var(--radius);
  border: 1px solid var(--gray-100);
}

.featured-content h2 {
  font-size: 28px;
  margin-bottom: 10px;
}

.featured-content p {
  color: var(--text-muted);
  margin-bottom: 15px;
}

.featured-content a {
  color: #1A6FD4;
  text-decoration: none;
  font-weight: 500;
}

/* GRID */
.blog-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

/* CARD */
.post {
  background: #fff;
  padding: 24px;
  border-radius: var(--radius);
  border: 1px solid var(--gray-100);
  transition: 0.2s;
}

.post:hover {
  transform: translateY(-3px);
  border-color: var(--gray-200);
  box-shadow: 0 8px 24px rgba(0,0,0,0.05);
}

.post h3 {
  margin-bottom: 8px;
  font-size: 18px;
}

.post p {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 10px;
}

.post a {
  color: #1A6FD4;
  text-decoration: none;
  font-weight: 500;
}

/* TABLET */
@media (max-width: 1024px) {
  .container {
    max-width: 900px;
  }

  .featured-post {
    grid-template-columns: 1fr 1fr;
  }
}

/* MOBILE */
@media (max-width: 768px) {

  nav {
    padding: 1rem 1.5rem;
  }

  .nav-links {
    display: none;
  }

  .container {
    margin: 60px auto;
    padding: 0 16px;
  }

  h1 {
    font-size: 30px;
  }

  .featured-post {
    grid-template-columns: 1fr;
    gap: 20px;
  }

  .featured-content h2 {
    font-size: 22px;
  }

  .blog-grid {
    grid-template-columns: 1fr;
  }

  .post {
    padding: 18px;
  }
}

/* FOOTER */
footer {
  padding: 2rem;
  text-align: center;
  font-size: 13px;
  color: #8A93A6;
  border-top: 1px solid var(--gray-100);
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">GTM Ace</a>
  <div class="nav-links">
    <a href="/#services">Services</a>
    <a href="/#about">About</a>
    <a href="/#contact">Contact</a>
    <a href="https://calendly.com/rahul-gtmace/30min" target="_blank" class="nav-cta">Book a free call</a>
  </div>
</nav>

<!-- BLOG -->
<div class="container">
  <h1>Blog</h1>

  <!-- FEATURED -->
  <div class="featured-post">
    <img src="/images/sample-blog.jpg" alt="Featured post">

    <div class="featured-content">
      <h2>Sample Blog Title</h2>
      <p>Short description of your blog post.</p>
      <a href="/blog/sample/">Read →</a>
    </div>
  </div>

  <!-- GRID -->
  <div class="blog-grid">

    <div class="post">
      <h3>Sample Blog Title</h3>
      <p>Short description of your blog post.</p>
      <a href="/blog/sample/">Read →</a>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  GTM Ace · Rahul Sawant · Mumbai
</footer>

</body>
</html>
