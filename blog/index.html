<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | GTM Ace</title>

<!-- ✅ SAME FONTS AS HOMEPAGE -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #0B1929;
  --gray-100: #EEF1F6;
  --gray-200: #D8DDE8;
  --text: #0B1929;
  --text-muted: #4A5568;
  --white: #FFFFFF;
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  font-family: 'Figtree', sans-serif;
  margin: 0;
  background: var(--white);
  color: var(--text);
}

/* NAV (copied from homepage) */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.1rem 3rem;
  background: rgba(255,255,255,0.95);
  border-bottom: 1px solid var(--gray-200);
}
.nav-logo {
  font-family: var(--heading);
  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.5px;
  text-decoration: none;
  transition: opacity 0.2s ease;
}

.nav-logo:visited,
.nav-logo:active {
  color: var(--navy);
  text-decoration: none;
}

/* 👇 ADD HOVER SEPARATELY */
.nav-logo:hover {
  color: var(--navy);
  text-decoration: none;
  opacity: 0.8;
}
.nav-links { display: flex; gap: 2rem; align-items: center; }
.nav-links a {
  font-size: 15px;
  color: var(--text-muted);
  text-decoration: none;
}
.nav-cta {
  background: #1E3A5F;
  color: #fff !important;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  text-decoration: none;
}

/* BLOG */
.container {
  max-width: 900px;
  margin: 80px auto;
  padding: 0 20px;
}

h1 {
  font-size: 36px;
  margin-bottom: 30px;
}

.post {
  background: #fff;
  padding: 24px;
  margin-bottom: 20px;
  border-radius: var(--radius);
  border: 1px solid var(--gray-100);
  transition: 0.2s;
}

.post:hover {
  transform: translateY(-3px);
  border-color: var(--gray-200);
  box-shadow: 0 8px 24px rgba(0,0,0,0.05);
}

.post h3 {
  margin-bottom: 10px;
  font-size: 20px;
}

.post p {
  color: #4A5568;
  font-size: 14px;
  margin-bottom: 10px;
}
  
.post a {
  color: #1A6FD4;
  text-decoration: none;
  font-weight: 500;
}
  
.post a:hover {
  text-decoration: underline;
}
  
footer {
  padding: 2rem;
  text-align: center;
  font-size: 13px;
  color: #8A93A6;
  border-top: 1px solid var(--gray-100);
}
</style>
</head>

<body>

<!-- ✅ NAVBAR -->
<nav>
  <a href="/" class="nav-logo">GTM Ace</a>
  <div class="nav-links">
    <a href="/#services">Services</a>
    <a href="/#about">About</a>
    <a href="/#contact">Contact</a>
    <a href="https://calendly.com/rahul-gtmace/30min" target="_blank" class="nav-cta">Book a free call</a>
  </div>
</nav>

<!-- BLOG CONTENT -->
<div class="container">
  <h1>Blog</h1>
  <!-- <div id="blog-list"></div> -->
    <div class="post">
    <h3>Sample Blog Title</h3>
    <p>Short description of your blog post.</p>
    <a href="/blog/sample/">Read →</a>
  </div>
</div>

<!-- FOOTER -->
<footer>
  GTM Ace · Rahul Sawant · Mumbai
</footer>

</body>
</html>
